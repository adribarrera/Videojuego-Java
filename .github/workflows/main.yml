name: Java CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          
      - name: Build executable JAR (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: eldap
        run: mvn -B -DskipTests clean package

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: eldap-binary-${{ github.sha }}
          path: |
            eldap/target/eldap-1.0-SNAPSHOT-all.jar
            eldap/target/eldap-1.0-SNAPSHOT.jar
          if-no-files-found: error
       
      - name: Publish GitHub Release (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: latest-eldap
          name: Latest eldap Build
          body: |
            Build generated automatically from main.
            Commit: ${{ github.sha }}
          artifacts: "eldap/target/eldap-1.0-SNAPSHOT-all.jar,eldap/target/eldap-1.0-SNAPSHOT.jar"
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          generateReleaseNotes: true

  deploy-javadoc-pages:
    needs: build-test-package
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Generate Javadoc
        working-directory: eldap
        run: mvn -B javadoc:javadoc

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact (Javadoc)
        uses: actions/upload-pages-artifact@v3
        with:
          path: eldap/target/reports/apidocs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
